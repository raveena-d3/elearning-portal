<div class="page-container">
  <div class="page-header">
    <h2>📖 Course Details</h2>
    <button mat-button routerLink="/courses">← Back to Courses</button>
  </div>

  <div class="loading-container" *ngIf="loading">
    <mat-spinner></mat-spinner>
  </div>

  <mat-card class="form-card" *ngIf="course && !loading">
    <mat-card-header>
      <mat-card-title>{{ course.title }}</mat-card-title>
      <mat-card-subtitle>👨‍🏫 Instructor: {{ course.instructorName }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p style="margin-top:16px; font-size:16px; line-height:1.6;">
        {{ course.description }}
      </p>

      <!-- YouTube Videos — only enrolled students + Admin + Instructor -->
      <div *ngIf="course.youtubeLinks && course.youtubeLinks.length > 0 && isEnrolled"
        class="resources-section">
        <h3>
          <mat-icon>play_circle</mat-icon>
          Video Resources
        </h3>
        <div class="youtube-videos-grid">
          <div class="youtube-video-item"
            *ngFor="let link of course.youtubeLinks; let i = index">
            <div class="video-label">Video {{ i + 1 }}</div>
            <iframe
              [src]="getEmbedUrl(link) | safeUrl"
              width="100%"
              height="250"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write;
                     encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
            <a mat-stroked-button [href]="link" target="_blank">
              <mat-icon>open_in_new</mat-icon>
              Open in YouTube
            </a>
          </div>
        </div>
      </div>

      <!-- Uploaded Video — only enrolled students + Admin + Instructor -->
      <div *ngIf="course.videoFileName && isEnrolled" class="resources-section">
        <h3>
          <mat-icon>video_library</mat-icon>
          Course Video
        </h3>
        <video
          controls
          width="100%"
          style="max-height: 400px; border-radius: 8px;"
          [src]="getCourseVideoUrl()">
          Your browser does not support the video tag.
        </video>
      </div>

      <!-- Lock message — unenrolled students only -->
      <div *ngIf="role === 'Student' && !isEnrolled &&
          (course.youtubeLinks?.length || course.videoFileName)"
        style="padding:20px; background:#FFF3E0; border-radius:8px;
               margin-top:16px; text-align:center;">
        <mat-icon style="color:#E65100">lock</mat-icon>
        <p style="color:#E65100; margin:8px 0 0;">
          Enroll in this course to access video resources.
        </p>
      </div>

    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="accent"
        *ngIf="role === 'Student'"
        (click)="enroll()">
        🎓 Enroll in this Course
      </button>
      <button mat-raised-button color="primary"
        *ngIf="role === 'Admin' || (role === 'Instructor' && course.instructorName === username)"
        [routerLink]="['/courses', course.id, 'edit']">
        ✏️ Edit Course
      </button>
    </mat-card-actions>
  </mat-card>

  <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
</div>
