<!-- src/app/courses/course-list/course-list.component.html -->
<div class="page-container">
  <div class="page-header">
    <h2>📚 Courses</h2>
    <button mat-raised-button color="primary"
      *ngIf="role === 'Admin'"
      routerLink="/courses/new">
      <mat-icon>add</mat-icon> New Course
    </button>
  </div>

  <div class="loading-container" *ngIf="loading">
    <mat-spinner></mat-spinner>
  </div>

  <div class="courses-grid" *ngIf="!loading">
    <mat-card class="course-card" *ngFor="let course of courses">
      <mat-card-header>
        <mat-card-title>{{ course.title }}</mat-card-title>
        <mat-card-subtitle>👨‍🏫 {{ course.instructorName }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>{{ course.description }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button color="primary" [routerLink]="['/courses', course.id]">
          View Details
        </button>
        <button mat-button color="accent"
          *ngIf="role === 'Student'"
          (click)="enroll(course.id)">
          Enroll
        </button>
        <button mat-icon-button
    *ngIf="role === 'Admin' || (role === 'Instructor' && course.instructorName === username)"
    [routerLink]="['/courses', course.id, 'edit']">
    <mat-icon>edit</mat-icon>
</button>
<button mat-icon-button color="warn"
    *ngIf="role === 'Admin' || (role === 'Instructor' && course.instructorName === username)"
    (click)="deleteCourse(course.id)">
    <mat-icon>delete</mat-icon>
</button>
      </mat-card-actions>
    </mat-card>

    <p *ngIf="courses.length === 0" class="empty-state">No courses found.</p>
  </div>
</div>
