<!-- src/app/quizzes/quiz-form/quiz-form.component.html -->
<div class="page-container">
  <div class="page-header">
    <h2>➕ New Quiz</h2>
  </div>

  <mat-card class="form-card">
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Quiz Title</mat-label>
        <input matInput [(ngModel)]="form.title" name="title" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Course ID</mat-label>
        <input matInput type="number" [(ngModel)]="form.courseId" name="courseId" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Instructor ID</mat-label>
        <input matInput type="number" [(ngModel)]="form.instructorId" name="instructorId" />
      </mat-form-field>

      <h4 style="margin: 16px 0 8px">Questions</h4>

      <div *ngFor="let q of questions; let i = index" class="question-block">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Question {{ i + 1 }}</mat-label>
          <input matInput [(ngModel)]="q.question" [name]="'q'+i" />
        </mat-form-field>

        <div *ngFor="let o of q.options; let j = index">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Option {{ j + 1 }}</mat-label>
            <input matInput [(ngModel)]="q.options[j]" [name]="'o'+i+j" />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correct Answer</mat-label>
          <input matInput [(ngModel)]="q.correctAnswer" [name]="'ans'+i" />
        </mat-form-field>
      </div>

      <button mat-button type="button" (click)="addQuestion()">
        <mat-icon>add</mat-icon> Add Question
      </button>

      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button routerLink="/quizzes">Cancel</button>
      <button mat-raised-button color="primary" (click)="onSubmit()">
        Create Quiz
      </button>
    </mat-card-actions>
  </mat-card>
</div>
