<!-- src/app/enrollments/enrollment-list/enrollment-list.component.html -->
<div class="page-container">
  <div class="page-header">
    <h2>🎓 My Enrollments</h2>
  </div>

  <div class="loading-container" *ngIf="loading">
    <mat-spinner></mat-spinner>
  </div>

  <div class="courses-grid" *ngIf="!loading">
    <mat-card class="enrollment-card" *ngFor="let e of enrollments">
      <mat-card-header>
        <mat-card-title>{{ e.courseTitle }}</mat-card-title>
        <mat-card-subtitle>Enrolled: {{ e.enrolledAt | date:'mediumDate' }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-actions>
        <button mat-button color="warn" (click)="unenroll(e.id)">Unenroll</button>
        <button mat-button routerLink="/discussions">Discussions</button>
        <button mat-button routerLink="/quizzes">Quizzes</button>
      </mat-card-actions>
    </mat-card>

    <p *ngIf="!loading && enrollments.length === 0" class="empty-state">
      You're not enrolled in any courses yet.
      <a routerLink="/courses">Browse courses</a>
    </p>
  </div>
</div>
